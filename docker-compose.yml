version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: arillaweb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: arillaweb
    ports:
      - "5432:5432"
    volumes:
      - arillaweb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  arillaweb-data:
